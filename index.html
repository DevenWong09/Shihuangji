<body>
  <!-- 进入界面 -->

    <!-- 远景层：真实图片底图（用户参考图） -->

      <div class="bg-image"></div>

    <!-- 雨雾层（远景和中景之间，柔化柔和） -->

      <div class="mist-band mist-1"></div>
      <div class="mist-band mist-2"></div>
      <div class="mist-band mist-3"></div>

          L 168 0
          L 168 240

        <rect x="130" y="-14" width="22" height="2" fill="#1a1410"/>

          <rect x="104" y="20" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="122" y="20" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="140" y="20" width="9" height="11" fill="#0a0807" rx="1"/>
          <!-- 楼层 2 -->
          <rect x="14" y="40" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="32" y="40" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="50" y="40" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="68" y="40" width="9" height="11" fill="#1a1208" rx="1"/>
          <rect x="86" y="40" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="104" y="40" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="122" y="40" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="140" y="40" width="9" height="11" fill="#0a0807" rx="1"/>
          <!-- 楼层 3 -->
          <rect x="14" y="60" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="32" y="60" width="9" height="11" fill="#1a1208" rx="1"/>

          <rect x="122" y="60" width="9" height="11" fill="#0a0807" rx="1"/>

          <rect x="50" y="120" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="68" y="120" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="86" y="120" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="104" y="120" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="122" y="120" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="140" y="120" width="9" height="11" fill="#0a0807" rx="1"/>

          <rect x="32" y="36" width="9" height="11" fill="#0a0807" rx="1"/>

          <rect x="104" y="36" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="14" y="56" width="9" height="11" fill="#1a1208" rx="1"/>
          <rect x="32" y="56" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="50" y="56" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="68" y="56" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="86" y="56" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="104" y="56" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="14" y="76" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="32" y="76" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="50" y="76" width="9" height="11" fill="#1a1208" rx="1"/>
          <rect x="68" y="76" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="86" y="76" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="104" y="76" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="14" y="96" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="32" y="96" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="50" y="96" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="68" y="96" width="9" height="11" fill="#0a0807" rx="1"/>
          <rect x="86" y="96" width="9" height="11" fill="#1a1208" rx="1"/>
          <rect x="104" y="96" width="9" height="11" fill="#0a0807" rx="1"/>
        </g>
        <rect x="68" y="36" width="9" height="11" fill="#ffb86b" opacity="0.75" rx="1"/>
        <!-- 一楼大门 -->
        <rect x="56" y="156" width="32" height="44" fill="#0a0807"/>
        <rect x="58" y="158" width="28" height="40" fill="#1a0a05"/>

      <!-- 街边公告栏（path 曲线框） -->

        <defs>
          <linearGradient id="boardG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1a1410"/>

        <rect x="8" y="14" width="22" height="16" fill="#6a5a3a" opacity="0.6"/>

        <rect x="14" y="40" width="28" height="0.6" fill="#1a0a05"/>

        <rect x="18" y="68" width="4" height="42" fill="#0e0a08"/>
        <rect x="58" y="68" width="4" height="42" fill="#0e0a08"/>
      </svg>

      <!-- 远处积水街道反光（横条） -->
      <div class="street-water">

        <div class="water-streak w2"></div>
        <div class="water-streak w3"></div>
        <div class="water-streak w4"></div>

      </div>

      <!-- 小店（右·path 曲线轮廓） -->

          <linearGradient id="shopRoof" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1f1a16"/>

        <!-- 招牌外发光 -->

          <animate attributeName="opacity" values="0.5;0.5;0.5;0.1;0.5;0.5;0.2;0.5" dur="6s" repeatCount="indefinite"/>
        </rect>
        <!-- 招牌灯下光晕 -->
        <ellipse cx="110" cy="78" rx="80" ry="20" fill="url(#lampGlow)"/>

        <path fill="url(#shopBody)" d="M 8 90 L 8 152 Q 8 156, 12 156 L 208 156 Q 212 156, 212 152 L 212 90 Z"/>
        <line x1="8" y1="90" x2="212" y2="90" stroke="#3a2818" stroke-width="1"/>

      <!-- 临时登记处方向牌（参考图核心元素） -->
      <svg class="bld bld-direction" viewBox="0 0 200 60" width="200" height="60">
        <defs>
          <linearGradient id="dirBoard" x1="0" y1="0" x2="0" y2="1">

          <filter id="lampBlur">
            <feGaussianBlur stdDeviation="20"/>

        </defs>
        <ellipse cx="1320" cy="0" rx="600" ry="900" fill="url(#lampVol)" filter="url(#lampBlur)"/>

      <h1 class="intro-title-main">拾荒记</h1>

    <!-- 旧纸残页（灯柱附近的破损纸张，仅作装饰，1 秒后保留可见状态） -->
    <div class="intro-layer layer-decor-papers" id="intro-decor-papers" aria-hidden="true"></div>

    <!-- 主入口卡：从右上角路灯光处飘来落到中央（点击翻阅七日记录） -->
    <div class="intro-layer layer-entry-card" id="intro-entry-card" aria-hidden="false"></div>

    <!-- 共享 SVG 滤镜资源（纤维+水渍+磨损） -->
    <svg class="svg-filters" aria-hidden="true">
      <defs>
        <!-- 纤维噪点滤镜：给卡片加纸张纤维 + 暗化 -->
        <filter id="paperFiber" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3" result="noise"/>
          <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.35  0 0 0 0 0.28  0 0 0 0 0.18  0 0 0 0.18 0" result="darkFiber"/>
          <feComposite in="darkFiber" in2="SourceGraphic" operator="in" result="texturedFiber"/>
          <feMerge>
            <feMergeNode in="SourceGraphic"/>
            <feMergeNode in="texturedFiber"/>
          </feMerge>
        </filter>
        <!-- 软水渍：柔化边缘的暗化 -->
        <filter id="waterStain" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="6"/>
        </filter>
        <!-- 卡片整体噪点 -->
        <filter id="paperGrain" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="2.5" numOctaves="2" seed="7"/>
          <feColorMatrix type="matrix" values="0 0 0 0 0.5  0 0 0 0 0.45  0 0 0 0 0.35  0 0 0 0.08 0"/>
          <feComposite in2="SourceGraphic" operator="in"/>
        </filter>
      </defs>
    </svg>

    <!-- 黄铜开始按钮 -->
    <div class="intro-layer layer-cta" aria-hidden="false">
      <p class="cta-pre-hint">如何离开？</p>
      <button type="button" class="intro-start-btn" id="intro-start-btn">
        <span class="btn-cap"></span>
        <span class="btn-face">
          <span class="btn-text">开 始 拾 荒</span>
          <span class="btn-hint">点击日记，翻看七日记录</span>
        </span>
      </button>
    </div>

    <!-- 七日记录旋转卡组（点击首页小卡时弹出） -->
    <div class="day-carousel" id="day-carousel" aria-hidden="true">
      <div class="carousel-backdrop" id="carousel-backdrop"></div>
      <div class="carousel-stage">
        <!-- 7 张日记卡由 JS 注入 -->
        <div class="carousel-track" id="carousel-track"></div>
        <!-- 左箭头 -->
        <button type="button" class="carousel-arrow carousel-arrow-left" id="carousel-left" aria-label="前一天">‹</button>
        <!-- 右箭头 -->
        <button type="button" class="carousel-arrow carousel-arrow-right" id="carousel-right" aria-label="后一天">›</button>
        <!-- 圆点导航 -->
        <div class="carousel-dots" id="carousel-dots"></div>
        <!-- 关闭按钮 -->
        <button type="button" class="carousel-close" id="carousel-close" aria-label="关闭七日记录">✕</button>
        <!-- 顶部说明 -->
        <div class="carousel-hint">七日记录 · 左右滑动或点击翻页</div>
      </div>
    </div>

    <!-- 音效开关 -->
    <button type="button" class="intro-sound" id="intro-sound" aria-label="切换音效">🔊</button>

  </div>

  <!-- 原有游戏主体 -->
  <div id="app" style="display:none;"></div>

  <script src="script.js"></script>
</body>
